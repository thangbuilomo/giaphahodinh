<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gia Phả Họ Đinh</title>
  <style>
    body { display:flex; justify-content:center; align-items:center; height:100vh; background-color:#f8fafc; margin:0; font-family:'Inter', sans-serif; }
    .card { text-align:center; background:white; padding:40px; border-radius:12px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); }
    h1 { margin-bottom:10px; color:#0f172a; }
    p { margin-bottom:30px; color:#475569; }
    .btn-group { display:flex; gap:20px; justify-content:center; }
    .link-btn { text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px 30px; border-radius:8px; font-weight:600; transition:all 0.2s; }
    .link-btn.ngang { background-color:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .link-btn.ngang:hover { background-color:#dbeafe; }
    .link-btn.doc { background-color:#fef2f2; color:#be123c; border:1px solid #fecdd3; }
    .link-btn.doc:hover { background-color:#fee2e2; }
    .link-btn.compact { background-color:#f8fafc; color:#0f172a; border:1px solid #cbd5e1; }
    .link-btn.compact:hover { background-color:#e2e8f0; }
    
    /* Login Form Styles */
    .login-form { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 10px; }
    .login-form input { padding: 12px 15px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 8px; width: 250px; outline: none; transition: all 0.2s; text-align: center; font-family: inherit; }
    .login-form input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    .login-form button { padding: 12px 25px; font-size: 16px; font-weight: 600; color: white; background-color: #0f172a; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; font-family: inherit; }
    .login-form button:hover { background-color: #334155; }
    .error-msg { color: #ef4444; font-size: 14px; display: none; margin-top: -5px; }
    
    #menu-section { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gia Phả Họ Đinh</h1>
    
    <div id="login-section" class="login-form">
      <p style="margin-bottom: 10px;">Vui lòng nhập mật khẩu để truy cập</p>
      <input type="password" id="password-input" placeholder="Nhập mật khẩu..." />
      <div id="error-msg" class="error-msg">Mật khẩu không chính xác!</div>
      <button onclick="checkPassword()">Xác nhận</button>
    </div>

    <div id="menu-section">
      <p>Vui lòng chọn chế độ hiển thị</p>
      <div class="btn-group">
        <a href="ngang.html" class="link-btn ngang">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="12" x2="21" y2="12"></line></svg>
        Sơ đồ Ngang
      </a>
      <a href="doc.html" class="link-btn doc">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg>
        Sơ đồ Dọc
      </a>
      <a href="compact5.html" class="link-btn compact">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="0" ry="0"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        Bản In
      </a>
      </div>
    </div>
  </div>

  <script>
    function checkPassword() {
      const input = document.getElementById('password-input').value;
      const errorMsg = document.getElementById('error-msg');
      
      if (input === 'Thang1989@') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('menu-section').style.display = 'block';
        errorMsg.style.display = 'none';
      } else {
        errorMsg.style.display = 'block';
      }
    }
    
    document.getElementById('password-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        checkPassword();
      }
    });
  </script>
</body>
</html>
